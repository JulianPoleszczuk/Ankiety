<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Admina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">

    <h2 class="mb-4">Panel Admina</h2>

    <!-- STATYSTYKI -->
    <div class="mb-4">
        <p>👀 Odwiedziny: <strong>{{ visits }}</strong></p>
        <p>🧑‍🤝‍🧑 Wypełniło ankietę: <strong>{{ users }}</strong></p>
        <p>📊 Liczba odpowiedzi: <strong>{{ count }}</strong></p>
    </div>

    <!-- EXPORT -->
    <div class="mb-4">
        <a href="/export_sav" class="btn btn-success me-2">SPSS (.sav)</a>
        <a href="/export_spss" class="btn btn-warning">SPSS (csv)</a>
    </div>

    <div class="row">

        <!-- LEWA -->
        <div class="col-md-4">

            <!-- RADIO -->
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">Radio</div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="action" value="add_radio">
                        <input class="form-control mb-2" name="question" placeholder="Pytanie" required>
                        <textarea class="form-control mb-2" name="options" placeholder="Tak, Nie"></textarea>
                        <button class="btn btn-primary w-100">Dodaj</button>
                    </form>
                </div>
            </div>

            <!-- MATRIX -->
            <div class="card mb-3">
                <div class="card-header bg-info text-white">Matrix</div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="action" value="add_matrix">
                        <input class="form-control mb-2" name="question" placeholder="Pytanie" required>

                        <div class="row mb-2">
                            <div class="col">
                                <input class="form-control" name="left_label" placeholder="Lewa">
                            </div>
                            <div class="col">
                                <input class="form-control" name="right_label" placeholder="Prawa">
                            </div>
                        </div>

                        <input type="number" class="form-control mb-2" name="scale" value="7">
                        <textarea class="form-control mb-2" name="rows" placeholder="Cecha1, Cecha2"></textarea>

                        <button class="btn btn-info w-100 text-white">Dodaj</button>
                    </form>
                </div>
            </div>

            <!-- OPEN NUMERIC -->
            <div class="card">
                <div class="card-header bg-secondary text-white">Pytanie liczbowe</div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="action" value="add_open">
                        <input class="form-control mb-2" name="question" placeholder="Np. Wiek" required>
                        <button class="btn btn-secondary w-100">Dodaj</button>
                    </form>
                </div>
            </div>

        </div>

        <!-- PRAWA -->
        <div class="col-md-8">

            <h4>Pytania</h4>

            {% for q in questions %}
            <div class="card mb-2">
                <div class="card-body d-flex justify-content-between">
                    <div>
                        <strong>{{ loop.index }}. {{ q.data.question }}</strong>
                        <span class="badge bg-secondary">{{ q.q_type }}</span>
                    </div>

                    <form method="POST">
                        <input type="hidden" name="action" value="delete">
                        <input type="hidden" name="q_id" value="{{ q.id }}">
                        <button class="btn btn-danger btn-sm">Usuń</button>
                    </form>
                </div>
            </div>
            {% endfor %}

            <!-- WYKRES -->
            <div class="card mt-4">
                <div class="card-header">Średnie cech</div>
                <div class="card-body">
                    <canvas id="chart"></canvas>
                </div>
            </div>

        </div>

    </div>

</div>

<script>
const labels = {{ labels|tojson|safe }};
const values = {{ values|tojson|safe }};

new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Średnia',
            data: values
        }]
    }
});
</script>

</body>
</html>
