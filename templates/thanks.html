<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dziękujemy!</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-black: #000000;
            --card-black: #0a0a0a;
            --accent-neon: #ccff00;
            --text-white: #ffffff;
            --text-dim: #888888;
            --border-dim: #222222;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .thanks-card {
            background: var(--card-black);
            border: 1px solid var(--border-dim);
            border-top: 4px solid var(--accent-neon);
            border-radius: 6px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.1);
        }

        .thanks-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-neon);
            margin-bottom: 20px;
        }

        .thanks-text {
            color: var(--text-white);
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .thanks-subtext {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .thanks-btn {
            margin-top: 30px;
            background: var(--accent-neon);
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            color: black;
            cursor: pointer;
        }

        .thanks-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="thanks-card">

        <div class="thanks-title">
            Dziękujemy!
        </div>

        <div class="thanks-text">
            Twoje odpowiedzi zostały pomyślnie zapisane w naszej bazie danych.
        </div>

        <div class="thanks-subtext">
            Możesz teraz zamknąć to okno.
        </div>
    </div>
</div>
</body>
</html>
